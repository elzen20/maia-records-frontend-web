name: Deploy to Firebase Hosting

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Select environment to deploy'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - prod

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build project for ${{ github.event.inputs.environment }}
        run: npm run build
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.APIKEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ vars.AUTHDOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ vars.PROJECTID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ vars.STORAGEBUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ vars.MESSAGINGSENDERID }}
          VITE_FIREBASE_APP_ID: ${{ vars.APPID }}
          VITE_FIREBASE_MEASUREMENT_ID: ${{ vars.MEASUREMENTID }}

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Deploy to Firebase - ${{ github.event.inputs.environment }}
        run: firebase deploy --token=${{ secrets.FIREBASE_TOKEN }} --project=${{ vars.PROJECTID }}

      - name: ✅ Deployment Successful
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "🎉 Deployment Successful!"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo ""
          echo "📦 Environment: ${{ github.event.inputs.environment }}"
          echo "🔧 Project ID: ${{ vars.PROJECTID }}"
          echo ""
          echo "🌐 Live URLs:"
          echo "   https://${{ vars.PROJECTID }}.web.app"
          echo "   https://${{ vars.PROJECTID }}.firebaseapp.com"
          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"



